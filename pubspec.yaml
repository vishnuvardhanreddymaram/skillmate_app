name: skillmate_app
description: SkillMate - Freelancing & Skill Sharing App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  # Auth
  google_sign_in: ^6.2.1
  font_awesome_flutter: ^10.7.0

  # State Management
  provider: ^6.1.1

  # UI
  cached_network_image: ^3.3.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  lottie: ^3.3.3
  badges: ^3.1.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  shared_preferences: ^2.2.2

  # Media
  image_picker: ^1.0.5

  # Notifications
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true